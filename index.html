<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥚</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>La Super Chasse au Trésor de Pâques 3000</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      color: #f0e6d3;
      overflow: hidden;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
      padding: 1rem;
      max-height: 100dvh;
    }

    .eggs {
      font-size: 3rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .title {
      font-size: 2.2rem;
      color: #f4d35e;
      text-shadow: 0 0 20px rgba(244, 211, 94, 0.4);
      line-height: 1.3;
      opacity: 0;
      transform: scale(0.5);
      animation: title-in 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
    }

    .title em {
      font-style: normal;
      color: #e63946;
      text-shadow: 0 0 15px rgba(230, 57, 70, 0.4);
    }

    .title .num {
      font-size: 2.8rem;
      display: block;
      background: linear-gradient(135deg, #f4d35e, #e63946, #457b9d, #2a9d8f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px rgba(244, 211, 94, 0.3));
    }

    @keyframes title-in {
      to { opacity: 1; transform: scale(1); }
    }

    .subtitle {
      font-size: 1.2rem;
      color: #f0e6d3;
      opacity: 0;
      animation: fade-in 0.6s ease 1.8s forwards;
    }

    @keyframes fade-in {
      to { opacity: 1; }
    }

    .start-btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      background: #f4d35e;
      color: #1a1a2e;
      font-family: 'Georgia', serif;
      font-size: 1.3rem;
      font-weight: bold;
      text-decoration: none;
      border-radius: 50px;
      box-shadow: 0 4px 20px rgba(244, 211, 94, 0.4);
      opacity: 0;
      transform: translateY(20px);
      animation: btn-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.2s forwards;
      transition: transform 0.2s ease;
    }

    .start-btn:active {
      transform: scale(0.95) !important;
    }

    @keyframes btn-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      font-size: 1.5rem;
      animation: sparkle-fall linear infinite;
      opacity: 0;
    }

    @keyframes sparkle-fall {
      0% { transform: translateY(-60px) rotate(0deg); opacity: 0; }
      5% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { transform: translateY(100dvh) rotate(360deg); opacity: 0; }
    }

    .sound-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 50;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(244, 211, 94, 0.5);
      background: rgba(26, 26, 46, 0.8);
      color: #f4d35e;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .sound-toggle:active {
      background: rgba(244, 211, 94, 0.2);
    }
  </style>
</head>
<body>

  <button class="sound-toggle" id="soundToggle">🔇</button>
  <div class="sparkles" id="sparkles"></div>

  <div class="splash">
    <div class="eggs">🥚🐣🥚🐰🥚🐣🥚</div>
    <h1 class="title">
      La Super Chasse au Trésor<br>
      <em>de Pâques</em><br>
      <span class="num">3000</span>
    </h1>
    <a href="00.html" class="start-btn" id="startBtn">🚀 C'est parti ! 🚀</a>
    <p class="subtitle">🗺️ Une aventure spécialement conçue pour Estelle 🌟</p>
  </div>

  <script src="zzfx.js"></script>
  <script>
    // Falling sparkles
    const sparkleEmojis = ['✨', '⭐', '🌟', '💫', '🥚', '🐣', '🐰', '🌸'];
    const container = document.getElementById('sparkles');

    for (let i = 0; i < 20; i++) {
      const span = document.createElement('span');
      span.classList.add('sparkle');
      span.textContent = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
      span.style.left = Math.random() * 100 + '%';
      span.style.animationDuration = (4 + Math.random() * 6) + 's';
      span.style.animationDelay = (Math.random() * 8) + 's';
      span.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
      container.appendChild(span);
    }

    // === Music ===
    const music = new Audio('songs/intro.mp3');
    music.loop = true;
    music.volume = 0.5;
    let musicPlaying = false;
    const toggleBtn = document.getElementById('soundToggle');

    function startMusic() {
      music.play();
      musicPlaying = true;
      toggleBtn.textContent = '🔊';
    }

    function stopMusic() {
      music.pause();
      musicPlaying = false;
      toggleBtn.textContent = '🔇';
    }

    // Toggle button
    toggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (musicPlaying) {
        stopMusic();
      } else {
        startMusic();
      }
    });

    // Button: fade music then navigate
    document.getElementById('startBtn').addEventListener('click', (e) => {
      e.preventDefault();
      zzfx(...[2,,1e3,,.1,.3,1,2,,,800,.1,,,,,,.5]);

      if (!musicPlaying) {
        setTimeout(() => { window.location.href = '00.html'; }, 300);
        return;
      }

      // fade out
      let vol = music.volume;
      const fade = setInterval(() => {
        vol -= 0.05;
        if (vol <= 0) {
          clearInterval(fade);
          music.pause();
          window.location.href = '00.html';
        } else {
          music.volume = vol;
        }
      }, 50);
    });
  </script>
</body>
</html>
