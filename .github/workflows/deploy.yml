name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: maths/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: maths
      - name: Build Astro
        run: npx astro build
        working-directory: maths
      - name: Copy STL static files
        run: cp -r stl maths/dist/stl
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: maths/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
